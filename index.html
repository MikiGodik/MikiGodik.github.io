    <style>
        body {

            overflow: auto;

        #shell::-webkit-scrollbar {

        #shell::-webkit-scrollbar-track {

        }

        .inspiration {
            position: absolute;
            bottom: 8px;

<body>
    <div id="header">
        <h1><a href="">127.43.109.1</a></h1>
        <h2><a href="javascript:run('cat telegram.txt')">Telegram</a>
    </div>
    <div id="shell">
        <div id="output"></div>
        <div class="input-wrap">
            <span>$</span>
            <input id="input" type="text" autofocus />
        </div>
    </div>
    <script src="main.js" type="text/javascript"></script>
    <script>
        var input = document.getElementById('input')
        var output = document.getElementById('output')

        var emulator = bashEmulator({
            workingDirectory: '/home/ATMX/',
            fileSystem: {
                '/': {
                    type: 'dir',
                    modified: Date.now()
                },
                '/home': {
                    type: 'dir',
                    modified: Date.now()
                },
                '/home/ATMX/telegram.txt': {
                    type: 'file',
                    modified: Date.now(),
                    content: '<a href="https://t.me/+WW9MPWY-IydmZDU0" target="_blank">here</a> is our telegram'
                },
                '/home/ATMX/.secret.txt': {
                    type: 'file',
                    modified: Date.now(),
                    content: 'perhaps "env" would reveal the hidden?'
                },
                '/etc/.bin': {
                    type: 'file',
                    modified: Date.now(),
                    content: 'This site design was originally made by <a href="https://github.com/SpookySec"target="_blank">SpookySec</a>'
                },
                '/home/ATMX/whoami.txt': {
                    type: 'file',
                    modified: Date.now(),
                    content: 'Hello, welcome to localhost.\nThere is hidden information on this site!\n\t- Be aware for viruses' 
                },
                '/etc': {
                    type: 'dir',
                    modified: Date.now()
                },
                '/bin': {
                    type: 'dir',
                    modified: Date.now()
                },
                '/bin/hack.bin': {
                    type: 'file',
                    modified: Date.now(),
                    content: '--- Y O U  W I L L  H E A R  U S  C O M I N G ---'
                },
                '/bin/WeAreWatching.webm': {
                    type: 'file',
                    modified: Date.now(),
                    content: '<a href="atmx.space/cjghw.html"target="_blank">...</a>'
                },
                '/proc': {
                    type: 'dir',
                    modified: Date.now()
                },
                '/proc/self': {
                    type: 'dir',
                    modified: Date.now()
                },
                '/proc/self/exe': {
                    type: 'file',
                    modified: Date.now(),
                    content: 'Right now, this server is running on localhost using a python web server',
                },
                '/home/ATMX': {
                    type: 'dir',
                    modified: Date.now()
                },
                '/dev': {
                    type: 'dir',
                    modified: Date.now()
                },
                '/usr': {
                    type: 'dir',
                    modified: Date.now()
                },
                '/bin/deleted': {
                    type: 'dir',
                    modified: Date.now()
                },
                '/bin/deleted/System32': {
                    type: 'dir',
                    modified: Date.now()
                },
                '/bin/deleted/System32/Projects': {
                    type: 'dir',
                    modified: Date.now()
                },
                '/bin/deleted/System32/Projects/OurProjects': {
                    type: 'file',
                    modified: Date.now(),
                    content: 'We are developers of Cheats for games. If you want one, join our telegram \n One of our projects in past was DTUS Community'
                },
                '/home/ATMX/Owners.txt': {
                    type: 'file',
                    modified: Date.now(),
                    content: 'Creators of ATMX group:\n- <a href="https://www.instagram.com/m1ki_0fficial/" target="_blank">Miki_Official</a>\n- <a href="https://www.instagram.com/coolax._?igsh=MTNoZGhkbWtkMXk4dg==" target="_blank">CoolAx</a>'
                }
            }
        })

        emulator.commands.clear = function(env) {
            output.innerHTML = ''
            env.exit()
        }

        var ENTER = 13
        var UP = 38
        var DOWN = 40

        function log(result) {
            if (result) {
                output.innerHTML += result + '\n'
            }
            var objDiv = document.getElementById("shell");
            objDiv.scrollTop = objDiv.scrollHeight;
        }

        function error(result) {
            log('<div class="error">' + result + '</div>')
        }

        function run(cmd) {
            var out = log('$ ' + cmd)
            return emulator.run(cmd).then(log, error)
        }

        var completeFunctions = {}
        completeFunctions[UP] = emulator.completeUp
        completeFunctions[DOWN] = emulator.completeDown

        function complete(direction) {
            var completeFunction = completeFunctions[direction]
            if (!completeFunction) {
                return
            }
            var cursorPosition = input.selectionStart
            var beforeCursor = input.value.slice(0, cursorPosition)
            completeFunction(beforeCursor).then(function(completion) {
                if (completion) {
                    input.value = completion
                    input.setSelectionRange(cursorPosition, cursorPosition)
                }
            })
        }

        input.addEventListener('keydown', function(e) {
            if (e.altKey || e.metaKey || e.shiftKey || e.ctrlKey) {
                e.preventDefault()
                input.focus()
            }
            if (e.which === UP || e.which === DOWN) {
                e.preventDefault()
                complete(e.which)
            }

            if (e.ctrlKey && event.keyCode == 76) {
                run("clear")
                input.focus()
            }

            if (e.key == "Tab") {
                e.preventDefault();
                let terms = input.value.split(' ');
                let fileToComplete = terms.pop();
                if (terms.length < 1 || fileToComplete.length < 1) {
                    // To stop command completion. Too much work
                    input.focus()
                    return;
                }
                emulator.readDir('.').then(function(files) {
                    let match = files.filter(file => !file.startsWith('.') && file.toLowerCase().includes(fileToComplete.toLowerCase()))[0];
                    if (match) {
                        input.value = terms.join(' ') + ' ' + match;
                    } else {
                        input.focus()
                        return;
                    }

                })
            }

            if (e.ctrlKey && event.keyCode == 67) {
                input.value = '\n';
                input.focus()
            }
        })

        input.addEventListener('keyup', function(e) {
            if (e.which !== ENTER) {
                return
            }
            run(input.value).then(function() {
                input.value = ''
                document.body.scrollTop = 10e6
            })
        })

        document.body.addEventListener('click', function() {
            // Prevent when user is selecting text
            if (!window.getSelection().isCollapsed) {
                return
            }
            input.focus()
        })

        run("ls").then(function() {
            run("cat whoami.txt")
        });
    </script>
